      <h1>Agent Platform — Hermes Agent Voice Chat with Memory &amp; Deep Research</h1>
      <p><strong>Agent Platform</strong> is the voice-first home for <strong>Hermes Agent</strong>, an installable AI assistant. Hold the on-screen mic button (or hold the spacebar on desktop) to talk; Hermes Agent transcribes your speech, routes the request to Claude, GPT-5, or Gemini, and can speak its reply back via OpenAI or Microsoft Azure neural voices.</p>

      <h2>Why Agent Platform</h2>
      <ul>
        <li><strong>Built around Hermes Agent.</strong> Persistent memory keeps facts and preferences across every conversation on Agent Platform.</li>
        <li><strong>Hold-to-talk anywhere.</strong> Push-to-talk voice input with live amplitude feedback. No browser TTS — top-tier speech models only.</li>
        <li><strong>Deep research, with citations.</strong> Hermes Agent plans, runs multi-step web searches across distinct angles, and cites primary sources.</li>
        <li><strong>Multi-model.</strong> Route Hermes Agent across Anthropic Claude Opus 4.7 / Sonnet 4.6 / Haiku 4.5, OpenAI GPT-5 / GPT-5 Mini, Google Gemini 3 Pro / Flash.</li>
        <li><strong>Installable PWA.</strong> Add Agent Platform to your home screen; offline app shell, mobile-first layout.</li>
      </ul>

      <h2>How Hermes Agent works on Agent Platform</h2>
      <p>Tap the microphone to start, release to send. The audio is transcribed by a top-tier speech-to-text model (OpenAI <code>gpt-4o-mini-transcribe</code> or Azure Speech). Hermes Agent streams a reply through your chosen language model, and Agent Platform can speak the response automatically with OpenAI <code>gpt-4o-mini-tts</code> or Azure Neural TTS. Every chat is saved as a transcript.</p>

      <h2>Frequently asked questions</h2>
      <h3>What is Agent Platform?</h3>
      <p>Agent Platform is a voice-first installable web app that lets you talk to Hermes Agent with a hold-to-talk button, persistent memory, and deep research across the web.</p>

      <h3>What is Hermes Agent?</h3>
      <p>Hermes Agent is the conversational AI served by Agent Platform. It supports voice input, spoken replies, deep research, and routes to top-tier models including Claude, GPT-5, and Gemini.</p>

      <h3>Which models can Hermes Agent use?</h3>
      <p>Hermes Agent on Agent Platform supports Anthropic Claude Opus 4.7, Claude Sonnet 4.6, Claude Haiku 4.5, OpenAI GPT-5 / GPT-5 Mini, and Google Gemini 3 Pro / Gemini 3 Flash. Voice runs on OpenAI or Microsoft Azure Speech.</p>

      <p>JavaScript is required to use the live Agent Platform application.</p>
