  <noscript>
    <main style="max-width:640px;margin:48px auto;padding:0 16px;font-family:system-ui,sans-serif;color:#111">
      <h1>Hermes Agent — Voice AI Chat with Memory &amp; Deep Research</h1>
      <p>Hermes Agent is a mobile-first installable voice assistant. Hold the on-screen mic button (or hold the spacebar on desktop) to talk; the assistant transcribes your speech, runs the request against Claude, GPT-5, or Gemini, and can speak its reply back using OpenAI or Azure neural voices.</p>
      <h2>Features</h2>
      <ul>
        <li>Hold-to-talk push-to-talk voice input with live amplitude feedback.</li>
        <li>Spoken replies (text-to-speech) powered by OpenAI <code>gpt-4o-mini-tts</code> or Azure Neural Voices.</li>
        <li>Persistent user memory injected into every conversation.</li>
        <li>Deep research mode: extended thinking plus multi-step web search with citations.</li>
        <li>Multi-provider model routing: Anthropic Claude Opus / Sonnet / Haiku 4.x, OpenAI GPT-5 family, Google Gemini 3 Pro / Flash.</li>
        <li>Installable Progressive Web App (PWA) with offline app shell.</li>
      </ul>
      <h2>How it works</h2>
      <p>Tap the microphone button to start a recording, release to send. Your audio is transcribed by a top-tier speech-to-text model, the chat model produces a streaming reply, and the assistant can speak the response automatically. Conversations are saved as transcripts.</p>
      <p>JavaScript is required to use the live application.</p>
    </main>
  </noscript>
