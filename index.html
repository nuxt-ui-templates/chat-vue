<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="mask-icon" href="/logo.svg" color="#42B883" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <meta name="theme-color" content="#fafafa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Chat Vue" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Chat Vue Voice" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=public-sans:400,500,600,700" rel="stylesheet" />
  <title>Chat Vue Voice</title>
  <meta name="description" content="Hold-to-talk AI chat PWA with top-tier models, persistent memory, and deep research.">
  <meta property="og:title" content="Chat Vue Voice">
  <meta property="og:description" content="Hold-to-talk AI chat PWA with top-tier models, persistent memory, and deep research.">
  <meta property="og:image" content="https://ui.nuxt.com/assets/templates/vue/chat-light.png">
  <meta name="twitter:card" content="summary_large_image">
  <style>html { background-color: #fafafa } html.dark { background-color: #09090b }</style>
  <script>
    (function () {
      var mode = localStorage.getItem('vueuse-color-scheme') || 'auto'
      var dark = mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)
      if (dark) {
        document.documentElement.classList.add('dark')
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#09090b')
      }
    })()
  </script>
</head>

<body>
  <div id="app" class="isolate"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
